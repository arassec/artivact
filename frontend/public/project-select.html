<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artivact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #F5F5F5;
      color: #364958;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 24px 32px 16px 32px;
      gap: 18px;
    }
    .header img {
      width: 64px;
      height: 64px;
      border: 1px solid #364958;
    }
    .header-text h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #364958;
    }
    .header-text p {
      font-size: 0.9rem;
      color: #364958;
      margin-top: 4px;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 32px;
      min-height: 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .project-list {
      flex: 1;
      border: 1px solid #364958;
      overflow-y: auto;
      background: #F5F5F5;
      min-height: 0;
    }
    .project-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #F5F5F5;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .project-item:last-child { border-bottom: none; }

    .project-item:hover {
      background: #6e7e85;
      color: #F5F5F5;
    }

    .project-item.selected {
      background: #364958;
      color: #F5F5F5;
    }
    .project-item .folder-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .project-item .project-path {
      font-size: 0.9rem;
      word-break: break-all;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #F5F5F5;
      font-size: 0.95rem;
      padding: 32px;
      text-align: center;
    }
    .footer {
      display: flex;
      justify-content: flex-end;
      padding: 16px 32px 24px 32px;
    }
    button {
      padding: 8px 20px;
      border: 1px solid #364958;
      border-radius: 6px;
      background: #6e7e85;
      color: #F5F5F5;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: #364958;
      border-color: #6e7e85;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary {
      background: #6e7e85;
      color: #F5F5F5;
      font-weight: 600;
      padding: 10px 32px;
    }

    button.primary:hover {
      background: #364958;
      border-color: #6e7e85;
    }

    button.primary:disabled {
      background: #6e7e85;
    }
    button.danger:hover { background: #6e2a2a; border-color: #8a3a3a; }
  </style>
</head>

    <div class="header-text">
      <h1>Artivact</h1>
      <p id="description"></p>
    </div>
  </div>

  <div class="content">
    <div class="toolbar">
      <button id="addBtn" onclick="addProject()"></button>
      <button id="removeBtn" class="danger" onclick="removeProject()" disabled></button>
    </div>
    <div class="project-list" id="projectList">
      <div class="empty-state" id="emptyState"></div>
    </div>
  </div>

  <div class="footer">
    <button id="startBtn" class="primary" onclick="startProject()" disabled></button>
  </div>

  <script>
    const i18n = {
      en: {
        description: 'Select an existing project directory to open it or add an empty one to start a new project.',
        addButton: 'Add Project Directory',
        removeButton: 'Remove Entry',
        startButton: 'Start',
        emptyState: 'No project directories configured yet. Click "Add Project Directory" to get started.',
      },
      de: {
        description: 'Wählen Sie ein bestehendes Projektverzeichnis zum Öffnen des Projekts, oder wählen Sie ein leeres Verzeichnis aus, um ein neues Projekt zu starten.',
        addButton: 'Projektverzeichnis hinzufügen',
        removeButton: 'Eintrag entfernen',
        startButton: 'Starten',
        emptyState: 'Noch keine Projektverzeichnisse konfiguriert. Klicken Sie auf "Projektverzeichnis hinzufügen", um zu beginnen.',
      }
    };

    let selectedProject = null;
    let projects = [];
    let lang = 'en';

    function t(key) {
      return (i18n[lang] && i18n[lang][key]) || i18n.en[key] || key;
    }

    function applyTranslations() {
      document.getElementById('description').textContent = t('description');
      document.getElementById('addBtn').textContent = t('addButton');
      document.getElementById('removeBtn').textContent = t('removeButton');
      document.getElementById('startBtn').textContent = t('startButton');
      document.getElementById('emptyState').textContent = t('emptyState');
    }

    function renderProjects() {
      const list = document.getElementById('projectList');
      const emptyState = document.getElementById('emptyState');

      // Remove all project items but keep the empty state element
      const items = list.querySelectorAll('.project-item');
      items.forEach(item => item.remove());

      if (projects.length === 0) {
        emptyState.style.display = 'flex';
      } else {
        emptyState.style.display = 'none';
        projects.forEach((projectPath, index) => {
          const item = document.createElement('div');
          item.className = 'project-item' + (projectPath === selectedProject ? ' selected' : '');
          const pathSpan = document.createElement('span');
          pathSpan.className = 'project-path';
          const parts = projectPath.replace(/[\\/]+$/, '').split(/[\\/]/);
          pathSpan.textContent = parts[parts.length - 1] || projectPath;
          pathSpan.title = projectPath;
          item.appendChild(pathSpan);
          item.onclick = () => selectProject(projectPath);
          item.ondblclick = () => { selectProject(projectPath); startProject(); };
          list.appendChild(item);
        });
      }

      updateButtons();
    }

    function selectProject(projectPath) {
      selectedProject = projectPath;
      renderProjects();
    }

    function updateButtons() {
      document.getElementById('removeBtn').disabled = !selectedProject;
      document.getElementById('startBtn').disabled = !selectedProject;
    }

    async function addProject() {
      const result = await window.projectSelectAPI.addProject();
      if (result) {
        projects = await window.projectSelectAPI.getProjects();
        selectedProject = result;
        renderProjects();
      }
    }

    async function removeProject() {
      if (selectedProject) {
        await window.projectSelectAPI.removeProject(selectedProject);
        projects = await window.projectSelectAPI.getProjects();
        selectedProject = null;
        renderProjects();
      }
    }

    async function startProject() {
      if (selectedProject) {
        document.getElementById('startBtn').disabled = true;
        await window.projectSelectAPI.startProject(selectedProject);
      }
    }

    // Initialize the dialog
    async function init() {
      const systemLocale = await window.projectSelectAPI.getSystemLocale();
      lang = systemLocale.startsWith('de') ? 'de' : 'en';
      applyTranslations();

      projects = await window.projectSelectAPI.getProjects();
      renderProjects();
    }

    init();
  </script>
</body>
</html>
